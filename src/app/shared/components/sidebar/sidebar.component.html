<div class="brand">
  <span class="brand-icon"><mat-icon fontSet="material-symbols-outlined">school</mat-icon></span>
  <span>
    <strong>SmartOps</strong>
    <small>Admin panel</small>
  </span>
</div>

<nav class="sidebar-nav" aria-label="Primary">
  @for (item of navItems; track trackNavItem($index, item)) {
    @if (item.section) {
      <div class="section-label">{{ item.section }}</div>
    }
    <a
      class="nav-item"
      [routerLink]="item.route"
      routerLinkActive="active-link"
      [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
    >
      <mat-icon fontSet="material-symbols-outlined">{{ item.icon }}</mat-icon>
      <span>{{ item.label }}</span>
      @if (item.badge) {
        <span class="nav-badge" [class.danger]="item.danger">{{ item.badge }}</span>
      }
    </a>
  }
</nav>

<div class="sidebar-footer">
  <span class="avatar">AD</span>
  <span>
    <strong>Admin</strong>
    <small>Super admin</small>
  </span>
</div>
