<mat-toolbar class="app-header">
  @if (!layoutUi.sidebarOpened()) {
    <button
      mat-icon-button
      type="button"
      class="sidebar-toggle"
      (click)="layoutUi.toggleSidebar()"
      aria-label="Open menu"
    >
      <mat-icon>read_more</mat-icon>
    </button>
  }
  <span class="spacer"></span>

  @if (ayContext.canSwitchYear() && ayContext.dropdownYears().length > 0) {
    <div class="header-year-picker">
      <button
        type="button"
        class="header-year-trigger"
        (click)="toggleYearMenu($event)"
        [attr.aria-expanded]="yearMenuOpen"
        aria-haspopup="listbox"
        aria-label="Academic year"
      >
        <mat-icon class="header-year-trigger-icon">calendar_month</mat-icon>
        <span class="header-year-trigger-label">{{ selectedYearLabel }}</span>
        <mat-icon class="header-year-trigger-chevron">{{ yearMenuOpen ? 'expand_less' : 'expand_more' }}</mat-icon>
      </button>
      @if (yearMenuOpen) {
        <div class="header-year-menu" role="listbox" aria-label="Academic years">
          @for (year of ayContext.dropdownYears(); track year.id) {
            <button
              type="button"
              class="header-year-option"
              role="option"
              [class.is-selected]="year.id === selectedYearId"
              [attr.aria-selected]="year.id === selectedYearId"
              (click)="pickYear(year.id, $event)"
            >
              <span>{{ year.name }}</span>
              @if (year.isCurrent) {
                <span class="header-year-option-tag">current</span>
              }
            </button>
          }
        </div>
      }
    </div>
  } @else if (academicYearLabel) {
    <span class="header-chip"><mat-icon>calendar_month</mat-icon>{{ academicYearLabel }}</span>
  }

  <span class="header-chip"><mat-icon>business</mat-icon>{{ schoolName }}</span>

  <button class="notification" mat-icon-button type="button" aria-label="Notifications">
    <mat-icon>notifications</mat-icon>
    <span></span>
  </button>

  <button mat-icon-button type="button" [matMenuTriggerFor]="userMenu" aria-label="User menu">
    <mat-icon>account_circle</mat-icon>
  </button>

  <mat-menu #userMenu="matMenu">
    <button mat-menu-item disabled>
      <mat-icon>person</mat-icon>
      <span>{{ auth.currentUser?.name ?? 'Signed in user' }}</span>
    </button>
    <mat-divider></mat-divider>
    <button mat-menu-item type="button" (click)="onLogout()">
      <mat-icon>logout</mat-icon>
      <span>Logout</span>
    </button>
  </mat-menu>
</mat-toolbar>
