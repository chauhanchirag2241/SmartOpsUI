<div class="topbar">
  <button type="button" class="back-btn" (click)="cancel.emit()">
    <mat-icon>arrow_back</mat-icon> Back
  </button>
  <div class="page-title">{{ pageTitle }}</div>
</div>

<div class="step-hint">Academic year details</div>

<form [formGroup]="ayForm">
  @for (card of formCards; track card.title) {
    <div class="card">
      <div class="card-title">
        <mat-icon>{{ card.icon }}</mat-icon>{{ card.title }}
      </div>
      <div [class]="card.grid">
        @for (field of card.fields; track field.key) {
          <app-dynamic-field
            [config]="configs[field.key]"
            [group]="ayForm"
            [full]="field.full ?? false"
          />
        }
      </div>
    </div>
  }
</form>

<div class="footer-actions">
  <button type="button" class="btn-back" style="visibility: hidden;">
    <mat-icon>arrow_back</mat-icon> Previous
  </button>

  <div class="footer-hint">Set academic year title and date range</div>

  @if (mode !== 'view') {
    <button type="button" class="btn-next" (click)="saveYear()" [disabled]="isSaving">
        <mat-icon>{{ isSaving ? 'hourglass_empty' : 'check_circle' }}</mat-icon>
        {{ isSaving ? 'Confirming...' : (mode === 'edit' ? 'Update Year' : 'Confirm & Add') }}
    </button>
  }
</div>
