<div class="topbar">
  <app-action-button type="back" style="order: 2; margin-left: auto;" (action)="cancel.emit()"></app-action-button>
  <div class="page-title">{{ pageTitle }}</div>
</div>

<div class="step-hint">Academic year details</div>

<form [formGroup]="ayForm">
  @for (tab of tabs; track tab.stepIndex) {
    @for (section of tab.sections; track section.title) {
      <div class="card">
        <div class="card-title">
          <mat-icon>{{ section.icon }}</mat-icon>{{ section.title }}
        </div>
        <div [class]="section.layout">
          @for (field of section.fields; track field) {
            <app-dynamic-field
              [config]="configs[field]"
              [group]="ayForm"
            />
          }
        </div>
      </div>
    }
  }
</form>

<div class="footer-actions">
  <app-action-button type="back" style="visibility: hidden;"></app-action-button>

  <div class="footer-hint">Set academic year title and date range</div>

  @if (mode !== 'view') {
    <app-action-button
      type="save"
      [label]="isSaving ? 'Confirming...' : (mode === 'edit' ? 'Update Year' : 'Confirm & Add')"
      [icon]="isSaving ? 'hourglass_empty' : 'check_circle'"
      [disabled]="isSaving"
      (action)="saveYear()">
    </app-action-button>
  }
</div>
