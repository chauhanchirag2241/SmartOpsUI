<section class="staff-leave-page">
  @if (!showApplyForm) {
    <app-scope-readonly-lock actionLabel="apply or edit leave" />
    <app-smart-data-table
      [config]="tableConfig"
      [data]="tableRows"
      [initialFilterValue]="currentFilter"
      (filterChanged)="onFilterChanged($event)"
      (addButtonClicked)="openApply()"
    />
  } @else {
    <app-apply-staff-leave (cancel)="closeApply()" (saved)="onApplySaved()" />
  }
</section>
