<section class="notices-page">
  @if (showView) {
    <app-notice-view
      [noticeId]="viewNoticeId"
      [isActive]="viewNoticeActive"
      (close)="closeView()"
    />
  } @else if (showResponses) {
    <app-notice-responses
      [noticeId]="responsesNoticeId"
      [noticeTitle]="responsesNoticeTitle"
      (close)="closeResponses()"
    />
  } @else if (!showAddForm) {
    <app-scope-readonly-lock actionLabel="create or publish notices" />
    <app-smart-data-table
      [config]="tableConfig"
      [data]="tableRows"
      [initialFilterValue]="currentFilter"
      (filterChanged)="onFilterChanged($event)"
      (addButtonClicked)="openCreate()"
      (actionClicked)="onAction($event)"
    />
  } @else {
    @for (key of [formOpenKey]; track key) {
      <app-add-notice [editId]="editNoticeId" (cancel)="closeAddForm()" (saved)="onNoticeSaved()" />
    }
  }
</section>
