<section class="students-page">
  @if (!showAddForm) {
    <header class="page-header">
      <div class="header-info">
        <h1>Students</h1>
        <span>Manage all enrolled students</span>
      </div>
      <button type="button" class="btn-primary" id="add-student-btn" (click)="openAddForm()">
        <mat-icon>add</mat-icon>
        Add student
      </button>
    </header>

    <app-smart-data-table
      [config]="tableConfig"
      [data]="students"
      [serverSide]="true"
      [totalRecords]="totalStudents"
      [rowClassFn]="studentRowClass"
      [initialFilterValue]="currentFilter.toString()"
      (pageChange)="onPageChange($event)"
      (filterChanged)="onFilterChanged($event)"
      (actionClicked)="onActionClicked($event)"
      (exportClicked)="onExportClicked()"
      (bulkActionClicked)="onBulkActionClicked($event)"
    />
  } @else {
    <app-add-student
      [mode]="formMode"
      [studentId]="selectedStudentId"
      (cancel)="closeAddForm()"
      (saved)="onStudentSaved()"
    />
  }
</section>
