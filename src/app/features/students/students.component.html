<section class="students-page">
  <ng-container *ngIf="!showAddForm">
    <!-- Page Header -->
    <header class="page-header">
      <div class="header-info">
        <h1>Students</h1>
        <span>Manage all enrolled students</span>
      </div>
      <button type="button" class="btn-primary" id="add-student-btn" (click)="openAddForm()">
        <mat-icon>add</mat-icon>
        Add student
      </button>
    </header>

    <!-- Smart Data Table -->
    <app-smart-data-table
      [config]="tableConfig"
      [data]="students"
      [serverSide]="true"
      [totalRecords]="totalStudents"
      (pageChange)="onPageChange($event)"
      (actionClicked)="onActionClicked($event)"
      (exportClicked)="onExportClicked()"
      (bulkActionClicked)="onBulkActionClicked($event)"
    />
  </ng-container>

  <!-- Add Student Form -->
  <ng-container *ngIf="showAddForm">
    <app-add-student 
      [mode]="formMode"
      [studentId]="selectedStudentId"
      (cancel)="closeAddForm()" 
      (saved)="onStudentSaved()"
    />
  </ng-container>
</section>
